name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APKs (Splits + Universal)
      # assembleDebug command saare architecture variants create kar degi
      run: ./gradlew assembleDebug

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: android-builds
        path: |
          **/build/outputs/apk/debug/*.apk
